{{ define "main" }}
  {{ partial "sidebar.html" (dict "context" . "disableSidebar" true) }}
  <main class="caiog-shell caiog-taxonomy">
    <header class="caiog-page-header">
      <small>TOPICS</small>
      <h1>主题</h1>
      <p>从关键词进入，寻找彼此关联的记录。</p>
    </header>
    <div class="caiog-taxonomy-grid">
      {{ range .Data.Terms.ByCount }}
        <a href="{{ .Page.RelPermalink }}"><span>{{ .Page.LinkTitle }}</span><b>{{ .Count }}</b></a>
      {{ end }}
    </div>
  </main>
{{ end }}
